kind = "web"
previewPath = "/"
title = "Open Brain MCP"
version = "1.0.0"
id = "artifacts/open-brain-mcp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25860
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/open-brain-mcp run dev"

[services.env]
PORT = "25860"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/open-brain-mcp", "run", "build"]
publicDir = "artifacts/open-brain-mcp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
